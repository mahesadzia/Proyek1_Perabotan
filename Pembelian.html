<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pembelian Barang</title>

    <link rel="stylesheet" href="Pembelian.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>

  <body>
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="admin-profile">
        <i class="fas fa-user-circle"></i>
        <span>Admin</span>
      </div>

      <a href="#"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="#"><i class="fas fa-boxes-stacked"></i> Inventori</a>

      <h3>Transaksi</h3>
      <a href="Pembelian.html" class="active">
        <i class="fas fa-shopping-cart"></i> Pembelian
      </a>
      <a href="Penjualan.html">
        <i class="fas fa-file-invoice"></i> Penjualan
      </a>

      <h3>Report</h3>
      <a href="LaporanPembelian.html">
        <i class="fas fa-chart-line"></i> Laporan Pembelian
      </a>
      <a href="LaporanPenjualan.html">
        <i class="fas fa-chart-bar"></i> Laporan Penjualan
      </a>
    </div>

    <!-- MAIN -->
    <div class="main-content">
      <!-- HEADER -->
      <div class="header">
        <h2>Transaksi Pembelian</h2>
        <div class="user-info">
          <span>admin perabotan</span>
          <i class="fas fa-user-circle"></i>
        </div>
      </div>

      <!-- FORM -->
      <div class="info-panel">
        <h3><i class="fas fa-plus-circle"></i> Tambah Pembelian</h3>

        <form>
          <div class="form-row">
            <div class="form-group">
              <label>Tanggal</label>
              <input type="date" id="tgl_beli" />
            </div>

            <div class="form-group">
              <label>No Faktur</label>
              <input type="text" placeholder="FKT-001" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Barang</label>
              <select>
                <option>Pilih Barang</option>
                <option>Ember</option>
                <option>Blender</option>
              </select>
            </div>

            <div class="form-group">
              <label>Supplier</label>
              <select>
                <option>Pilih Supplier</option>
                <option>PT Jaya</option>
                <option>CV Makmur</option>
              </select>
            </div>
          </div>

          <div class="form-row three-cols">
            <div class="form-group">
              <label>Jumlah</label>
              <input type="number" id="jumlah" />
            </div>

            <div class="form-group">
              <label>Harga</label>
              <input type="number" id="harga" />
            </div>

            <div class="form-group">
              <label>Total</label>
              <input type="number" id="total" readonly />
            </div>
          </div>

          <div class="form-actions">
            <button type="reset" class="btn btn-secondary">Reset</button>
            <button type="submit" class="btn btn-primary">Simpan</button>
          </div>
        </form>
      </div>

      <!-- TABLE -->
      <div class="info-panel">
        <h3><i class="fas fa-history"></i> Riwayat Pembelian</h3>

        <table class="data-table">
          <thead>
            <tr>
              <th>No</th>
              <th>Tanggal</th>
              <th>Barang</th>
              <th>Jumlah</th>
              <th>Total</th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <td>1</td>
              <td>2023-10-01</td>
              <td>Ember</td>
              <td>10</td>
              <td>100.000</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <script>
      const jumlah = document.getElementById("jumlah");
      const harga = document.getElementById("harga");
      const total = document.getElementById("total");

      function hitung() {
        total.value = jumlah.value * harga.value || 0;
      }

      jumlah.addEventListener("input", hitung);
      harga.addEventListener("input", hitung);
    </script>
  </body>
</html>
