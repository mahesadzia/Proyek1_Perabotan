<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transaksi Penjualan</title>

    <link rel="stylesheet" href="penjualan.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
  </head>

  <body>
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="admin-profile">
        <i class="fas fa-user-circle"></i>
        <span>Admin</span>
      </div>

      <a href="Dashboard.html"
        ><i class="fas fa-tachometer-alt"></i> Dashboard</a
      >
      <a href="inventoriBarang.html"
        ><i class="fas fa-boxes-stacked"></i> Inventori</a
      >

      <h3>Transaksi</h3>
      <a href="Pembelian.html"
        ><i class="fas fa-shopping-cart"></i> Pembelian</a
      >
      <a href="Penjualan.html" class="active">
        <i class="fas fa-file-invoice"></i> Penjualan
      </a>

      <h3>Report</h3>
      <a href="LaporanPembelian.html"
        ><i class="fas fa-chart-line"></i> Laporan Pembelian</a
      >
      <a href="LaporanPenjualan.html"
        ><i class="fas fa-chart-bar"></i> Laporan Penjualan</a
      >
    </div>

    <!-- MAIN -->
    <div class="main-content">
      <!-- HEADER -->
      <div class="header">
        <h2>Transaksi Penjualan</h2>
        <div class="user-info">
          <span>admin perabotan</span>
          <i class="fas fa-user-circle"></i>
        </div>
      </div>

      <!-- FORM -->
      <div class="info-panel">
        <h3><i class="fas fa-plus-circle"></i> Input Penjualan</h3>

        <div class="form-row">
          <div class="form-group">
            <label>Tanggal</label>
            <input type="date" />
          </div>

          <div class="form-group">
            <label>Barang</label>
            <input type="text" placeholder="Nama barang" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Jumlah</label>
            <input type="number" id="jumlah" />
          </div>

          <div class="form-group">
            <label>Harga</label>
            <input type="number" id="harga" />
          </div>

          <div class="form-group">
            <label>Total</label>
            <input type="number" id="total" readonly />
          </div>
        </div>

        <div class="form-actions">
          <button class="btn btn-primary">
            <i class="fas fa-save"></i> Simpan
          </button>
        </div>
      </div>

      <!-- TABLE -->
      <div class="info-panel">
        <h3><i class="fas fa-list"></i> Riwayat Penjualan</h3>

        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>No</th>
                <th>Tanggal</th>
                <th>Barang</th>
                <th class="text-center">Jumlah</th>
                <th class="text-right">Total</th>
                <th class="text-center">Aksi</th>
              </tr>
            </thead>

            <tbody>
              <tr>
                <td>1</td>
                <td>2026-10-11</td>
                <td>Ember Besar</td>
                <td class="text-center">20</td>
                <td class="text-right">140.000</td>
                <td class="text-center">
                  <button class="btn-icon"><i class="fas fa-edit"></i></button>
                  <button class="btn-icon"><i class="fas fa-trash"></i></button>
                </td>
              </tr>

              <tr>
                <td>2</td>
                <td>2026-11-20</td>
                <td>Centong Nasi</td>
                <td class="text-center">10</td>
                <td class="text-right">30.000</td>
                <td class="text-center">
                  <button class="btn-icon"><i class="fas fa-edit"></i></button>
                  <button class="btn-icon"><i class="fas fa-trash"></i></button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const jumlah = document.getElementById("jumlah");
      const harga = document.getElementById("harga");
      const total = document.getElementById("total");

      function hitung() {
        total.value = jumlah.value * harga.value || 0;
      }

      jumlah.addEventListener("input", hitung);
      harga.addEventListener("input", hitung);
    </script>
  </body>
</html>
