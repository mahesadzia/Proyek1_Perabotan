<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transaksi Penjualan - Sistem Inventori</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <style>
      /* =========================================
           CSS BAWAAN DARI INDEX (TIDAK DIUBAH)
           ========================================= */
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        height: 100vh;
        background-color: #f4f4f4;
      }

      .sidebar {
        width: 250px;
        background-color: #337ab7;
        color: #fff;
        padding: 20px;
        box-sizing: border-box;
        flex-shrink: 0;
      }

      .admin-profile {
        display: flex;
        align-items: center;
        margin-bottom: 30px;
        padding-bottom: 15px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      }

      .admin-profile i {
        font-size: 3rem;
        margin-right: 15px;
      }

      .sidebar a {
        display: block;
        color: #fff;
        text-decoration: none;
        padding: 12px 10px;
        border-radius: 4px;
        transition: background-color 0.3s;
      }

      .sidebar a i:first-child {
        width: 25px;
        margin-right: 10px;
      }

      .sidebar a:hover,
      .sidebar a.active {
        background-color: rgba(255, 255, 255, 0.1);
      }

      .sidebar h3 {
        margin-top: 25px;
        margin-bottom: 10px;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: rgba(255, 255, 255, 0.6);
      }

      .main-content {
        flex: 1;
        padding: 25px;
        box-sizing: border-box;
        overflow-y: auto;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 25px;
      }

      .header h2 {
        margin: 0;
        font-weight: 400;
      }

      .user-info {
        display: flex;
        align-items: center;
      }

      .user-info i {
        font-size: 1.5rem;
        margin-left: 10px;
        color: #888;
      }

      /* =========================================
           CSS TAMBAHAN UNTUK HALAMAN PENJUALAN
           ========================================= */

      /* Panel Utama (Menggunakan gaya yang mirip dengan .info-panel dari index) */
      .panel {
        background-color: #fff;
        padding: 25px;
        border-radius: 5px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        margin-bottom: 25px;
      }

      .panel h3 {
        margin-top: 0;
        margin-bottom: 20px;
        font-weight: 400;
        color: #555;
        border-bottom: 1px solid #eee;
        padding-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      /* Form Input */
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .form-group label {
        font-size: 0.9rem;
        color: #555;
      }

      .form-group input {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 4px;
        outline: none;
        font-size: 0.95rem;
      }

      .form-group input:focus {
        border-color: #337ab7;
      }

      .btn-submit {
        background-color: #5cb85c; /* Warna hijau senada dengan card dashboard */
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.95rem;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: 0.3s;
      }

      .btn-submit:hover {
        background-color: #4cae4c;
      }

      /* Tabel Riwayat */
      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 12px 15px;
        border-bottom: 1px solid #eee;
        text-align: left;
        font-size: 0.95rem;
        color: #333;
      }

      th {
        color: #555;
        font-weight: 600;
        background-color: #f9f9f9;
      }

      .text-center {
        text-align: center;
      }

      /* Tombol Aksi di Tabel */
      .btn-action {
        border: none;
        color: white;
        padding: 6px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 0.8rem;
        margin: 0 2px;
        transition: 0.3s;
      }

      .btn-edit {
        background-color: #f0ad4e;
      } /* Oranye */
      .btn-edit:hover {
        background-color: #ec971f;
      }

      .btn-delete {
        background-color: #d9534f;
      } /* Merah */
      .btn-delete:hover {
        background-color: #c9302c;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <div class="admin-profile">
        <i class="fas fa-user-circle"></i>
        <a href="#">Admin</a>
      </div>

      <a href="index.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="inventoriBarang.html"
        ><i class="fas fa-boxes-stacked"></i> Inventori</a
      >

      <h3>Transaksi</h3>
      <a href="Pembelian.html"
        ><i class="fas fa-shopping-cart"></i> Pembelian</a
      >
      <a href="Penjualan.html" class="active"
        ><i class="fas fa-file-invoice"></i> Penjualan</a
      >

      <h3>Report</h3>
      <a href="LaporanPembelian.html"
        ><i class="fas fa-chart-line"></i> Laporan Pembelian</a
      >
      <a href="LaporanPenjualan.html"
        ><i class="fas fa-chart-bar"></i> Laporan Penjualan</a
      >
    </div>

    <div class="main-content">
      <div class="header">
        <h2>Transaksi Penjualan</h2>
        <div class="user-info">
          <span>admin</span>
          <i class="fas fa-user-circle"></i>
        </div>
      </div>

      <div class="panel">
        <h3>
          <i class="fas fa-plus-circle" style="color: #337ab7"></i> Input
          Penjualan Baru
        </h3>

        <div class="form-grid">
          <div class="form-group">
            <label>Tanggal Transaksi</label>
            <input type="date" />
          </div>
          <div class="form-group">
            <label>Barang yang dijual</label>
            <input type="text" placeholder="Masukkan nama barang..." />
          </div>
          <div class="form-group">
            <label>Jumlah (Qty)</label>
            <input type="number" placeholder="0" />
          </div>
          <div class="form-group">
            <label>Total Harga (Rp)</label>
            <input type="number" placeholder="0" />
          </div>
        </div>

        <button class="btn-submit">
          <i class="fas fa-save"></i> Simpan Transaksi
        </button>
      </div>

      <div class="panel">
        <h3>
          <i class="fas fa-list" style="color: #337ab7"></i> Riwayat Penjualan
          Terakhir
        </h3>

        <div style="overflow-x: auto">
          <table>
            <thead>
              <tr>
                <th class="text-center">No</th>
                <th>Tanggal</th>
                <th>Barang</th>
                <th class="text-center">Jumlah</th>
                <th>Total (Rp)</th>
                <th class="text-center">Aksi</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td class="text-center">1</td>
                <td>2026-10-11</td>
                <td>Ember Besar</td>
                <td class="text-center">20</td>
                <td>140.000</td>
                <td class="text-center">
                  <button class="btn-action btn-edit" title="Edit">
                    <i class="fas fa-edit"></i>
                  </button>
                  <button class="btn-action btn-delete" title="Hapus">
                    <i class="fas fa-trash"></i>
                  </button>
                </td>
              </tr>
              <tr>
                <td class="text-center">2</td>
                <td>2026-11-20</td>
                <td>Centong Nasi</td>
                <td class="text-center">10</td>
                <td>30.000</td>
                <td class="text-center">
                  <button class="btn-action btn-edit" title="Edit">
                    <i class="fas fa-edit"></i>
                  </button>
                  <button class="btn-action btn-delete" title="Hapus">
                    <i class="fas fa-trash"></i>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      // Script dari index
      function toggleDropdown() {
        var dropdown = document.getElementById("adminMenu");
        if (dropdown) {
          dropdown.style.display =
            dropdown.style.display === "block" ? "none" : "block";
        }
      }
    </script>
  </body>
</html>
